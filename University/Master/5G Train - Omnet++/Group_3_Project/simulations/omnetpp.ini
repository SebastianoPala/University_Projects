[General]
network = Railway
sim-time-limit = 1800s

**.vector-recording = false


seed-set = ${repetition}

# output files
output-scalar-file = ${resultdir}/${configname}/itervars=${iterationvars}-repetition=${repetition}.sca
output-vector-file = ${resultdir}/${configname}/itervars=${iterationvars}-repetition=${repetition}.vec

# railway lenght
Railway.rail_length = 10km # in km

# handover interval
**.ap.handover_interval = 0.01s # seconds

# sampling period - determines how often the simulation sends throughput/response time information for vector statistics, higher = less memory usage
*.train.ap.sampling_period = 100000s  # higher than simulation time by default: means no samples will be sent during the simulation, as it's used only for the warmup calibration

# debug
*.train.dbg.debug = true # prints debug values on-screen

# update intervals
*.train.trainUpdateInterval = 0.05s # seconds -> how often the train updates its position
*.train.dbg.update_rate = 0.001s # seconds -> how often the debug module updates the on-screen value

#########################################################################################################
#Deterministic
#########################################################################################################

[Deterministic-Test-Throughput]

sim-time-limit = 1000s

repeat = 1

warmup-period = 0s

**.train.randomness = false # all random variables extraction are turned off; the means are used instead

# number of base stations
*.num_base = 10

# train parameters 
*.train.trainSpeed = 300kmph # in kmph

# passenger parameters
*.train.passenger_count = 10
*.train.passengers[*].packet_size = 100B # bytes
*.train.passengers[*].generation_delay = 1s # seconds 

# access point parameters
*.train.ap.max_data_rate = 35e5 # in bytes/sec
*.train.ap.handover_mean = 0s # seconds

