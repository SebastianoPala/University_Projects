repeat = 15

**.vector-recording = true

warmup-period = 0s

# number of base stations
*.num_base = 16

# train parameters 
*.train.trainSpeed = 300kmph # in kmph

# passenger parameters
*.train.passenger_count = 200
*.train.passengers[*].packet_size = 400B # bytes
*.train.passengers[*].generation_delay = 0.03s # seconds

# access point parameters
*.train.ap.max_data_rate = 35e5 # in bytes/sec
*.train.ap.handover_mean = 0.5s # seconds

# sampling period for throughput and response time
*.train.ap.sampling_period = 0.01s

#########################################################################################################
#Full Factorial
#########################################################################################################

[Full-factorial]

sim-time-limit = 1800s

repeat = 30

warmup-period = 400s

# number of base stations
*.num_base = ${bs=4,7,10,13,16}

# train parameters 
*.train.trainSpeed = 300kmph # in kmph

# passenger parameters
*.train.passenger_count = ${ps=50,100,200,300,400}
*.train.passengers[*].packet_size = 400B # bytes
*.train.passengers[*].generation_delay = 0.03s # seconds

# access point parameters
*.train.ap.max_data_rate = 35e5 # in bytes/sec
*.train.ap.handover_mean = ${hd=0.3,0.7,1.1}s # seconds



